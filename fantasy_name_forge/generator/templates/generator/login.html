<style>
    body {
        font-family: 'Segoe UI', 'Verdana', sans-serif;
        background: #121212;
        color: #eee;
        text-align: center;
        padding: 60px;
    }

    h2 {
        font-size: 32px;
        color: #00ffcc;
        margin-bottom: 30px;
        animation: glowText 2s ease-in-out infinite alternate;
    }

    @keyframes glowText {
        from { text-shadow: 0 0 5px #00ffcc; }
        to { text-shadow: 0 0 20px #00ffcc; }
    }

    form {
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 10px;
        padding: 30px;
        max-width: 400px;
        margin: 0 auto;
        box-shadow: 0 0 15px #00ffcc55;
        animation: fadeInForm 1s ease-out;
    }

    @keyframes fadeInForm {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    }

    label {
        display: block;
        margin-top: 15px;
        font-size: 16px;
        color: #ccc;
        text-align: left;
    }

    input[type="text"],
    input[type="password"] {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 5px;
        border: none;
        background: #2a2a2a;
        color: #eee;
        box-shadow: inset 0 0 5px #00ffcc33;
    }

    button {
        margin-top: 25px;
        padding: 10px 20px;
        background: #00ffcc;
        color: #121212;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    button:hover {
        background: #00ddb3;
        box-shadow: 0 0 10px #00ffcc88;
    }

    .back-link {
        display: inline-block;
        margin-top: 30px;
        color: #00ffcc;
        text-decoration: none;
        font-size: 16px;
    }

    .back-link:hover {
        text-decoration: underline;
    }

    .errorlist {
        color: #ff6666;
        list-style: none;
        padding: 0;
        margin-top: 10px;
    }
</style>

<h2>🔐 Login</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
</form>
